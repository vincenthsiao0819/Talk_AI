- id: '1718873000002'
  alias: "客廳廣播：門鎖觸發歡迎系統"
  mode: restart
  trigger:
    # 主力：MacroDroid 從平板內部攔截推播，瞬間送達 (零延遲)
    - id: macrodroid_webhook
      platform: webhook
      webhook_id: welcome_door_lock_md
      allowed_methods:
        - POST
      local_only: true
    # 備援：HA Companion App 同步推播 (可能有延遲)
    - id: door_lock_sensor
      platform: state
      entity_id: sensor.sm_x936b_vincent_pad_last_notification
  condition:
    - condition: template
      value_template: >-
        {% if trigger.id == 'macrodroid_webhook' %}
          true
        {% else %}
          {% set title = trigger.to_state.state if trigger.to_state else '' %}
          {% set text = trigger.to_state.attributes.get('android.text', '') if trigger.to_state and trigger.to_state.attributes else '' %}
          {{ trigger.to_state is not none and 'ADB_HEARTBEAT' not in (title ~ text) and ('com.shyh_yih.household' in (title ~ text) or '用戶：' in (title ~ text) or 'Vincent' in (title ~ text) or 'Anna' in (title ~ text) or 'Sunny' in (title ~ text) or '千晴' in (title ~ text) or '親愛的' in (title ~ text) or 'Ray' in (title ~ text) or '阿公' in (title ~ text) or '叔叔' in (title ~ text) or '阿嬤' in (title ~ text) or '爺爺' in (title ~ text) or '奶奶' in (title ~ text)) }}
        {% endif %}
  action:
    - delay: "00:00:30"
    - variables:
        # 從門鎖通知中提取開門的人名
        door_notif: >-
          {% set webhook_text = '' %}
          {% if trigger.id == 'macrodroid_webhook' %}
            {% if trigger.json is defined and trigger.json %}{% set webhook_text = trigger.json.get('text', '') %}{% elif trigger.data is defined and trigger.data %}{% set webhook_text = trigger.data.get('text', '') %}{% endif %}
          {% endif %}
          {% if webhook_text | trim != '' %}
            {{ webhook_text }}
          {% else %}
            {{ states('sensor.sm_x936b_vincent_pad_last_notification') ~ states.sensor.sm_x936b_vincent_pad_last_notification.attributes.get('android.text', '') }}
          {% endif %}
        welcome_names: >-
          {% set names = namespace(list=[]) %}
          {# 第一優先：門鎖通知中提到的人名 #}
          {% if 'Vincent' in door_notif %}{% set names.list = names.list + ['Vincent'] %}{% endif %}
          {% if 'Anna' in door_notif %}{% set names.list = names.list + ['Anna'] %}{% endif %}
          {% if 'Sunny' in door_notif or '千晴' in door_notif %}{% set names.list = names.list + ['千晴'] %}{% endif %}
          {% if 'Ray' in door_notif %}{% set names.list = names.list + ['Ray'] %}{% endif %}
          {% if '阿公' in door_notif %}{% set names.list = names.list + ['阿公'] %}{% endif %}
          {% if '叔叔' in door_notif %}{% set names.list = names.list + ['叔叔'] %}{% endif %}
          {% if '阿嬤' in door_notif %}{% set names.list = names.list + ['阿嬤'] %}{% endif %}
          {% if '爺爺' in door_notif %}{% set names.list = names.list + ['爺爺'] %}{% endif %}
          {% if '奶奶' in door_notif %}{% set names.list = names.list + ['奶奶'] %}{% endif %}
          {# 第三優先：如果以上都沒中，且有「用戶：」，動態擷取名字 (例如阿公、阿嬤、打掃阿姨等) #}
          {% if '用戶：' in door_notif %}
            {% set extracted = door_notif.split('用戶：')[1].split(' ')[0] | trim %}
            {% if extracted not in names.list and extracted != '-' %}{% set names.list = names.list + [extracted] %}{% endif %}
          {% endif %}
          {# 第二優先：最近 3 分鐘內定位剛到家的人（補充門鎖沒抓到的同行者） #}
          {% if is_state('device_tracker.vincent_iphone', 'home') and now() - states.device_tracker.vincent_iphone.last_changed < timedelta(minutes=3) %}
            {% if 'Vincent' not in names.list %}{% set names.list = names.list + ['Vincent'] %}{% endif %}
          {% endif %}
          {% if is_state('device_tracker.anna_iphone', 'home') and now() - states.device_tracker.anna_iphone.last_changed < timedelta(minutes=3) %}
            {% if 'Anna' not in names.list %}{% set names.list = names.list + ['Anna'] %}{% endif %}
          {% endif %}
          {% if is_state('device_tracker.sunny_iphone', 'home') and now() - states.device_tracker.sunny_iphone.last_changed < timedelta(minutes=3) %}
            {% if '千晴' not in names.list %}{% set names.list = names.list + ['千晴'] %}{% endif %}
          {% endif %}
          {% if is_state('device_tracker.ray_iphone', 'home') and now() - states.device_tracker.ray_iphone.last_changed < timedelta(minutes=3) %}
            {% if 'Ray' not in names.list %}{% set names.list = names.list + ['Ray'] %}{% endif %}
          {% endif %}
          {% if is_state('device_tracker.oppo_find_x5_pro', 'home') and now() - states.device_tracker.oppo_find_x5_pro.last_changed < timedelta(minutes=3) %}
            {% if '阿公' not in names.list %}{% set names.list = names.list + ['阿公'] %}{% endif %}
          {% endif %}
          {% if is_state('device_tracker.iphone_4', 'home') and now() - states.device_tracker.iphone_4.last_changed < timedelta(minutes=3) %}
            {% if '叔叔' not in names.list %}{% set names.list = names.list + ['叔叔'] %}{% endif %}
          {% endif %}
          {% if is_state('device_tracker.iphone_3', 'home') and now() - states.device_tracker.iphone_3.last_changed < timedelta(minutes=3) %}
            {% if '阿嬤' not in names.list %}{% set names.list = names.list + ['阿嬤'] %}{% endif %}
          {% endif %}
          {% if is_state('device_tracker.iphone_2', 'home') and now() - states.device_tracker.iphone_2.last_changed < timedelta(minutes=3) %}
            {% if '爺爺' not in names.list %}{% set names.list = names.list + ['爺爺'] %}{% endif %}
          {% endif %}
          {% if is_state('device_tracker.iphone', 'home') and now() - states.device_tracker.iphone.last_changed < timedelta(minutes=3) %}
            {% if '奶奶' not in names.list %}{% set names.list = names.list + ['奶奶'] %}{% endif %}
          {% endif %}
          {# 親愛的永遠排在最後 #}
          {% if '親愛的' in door_notif and '親愛的' not in names.list %}{% set names.list = names.list + ['親愛的'] %}{% endif %}
          {{ names.list | join('、') }}
    - service: persistent_notification.create
      data:
        title: "Webhook Debug"
        message: "Parsed Names: {{ welcome_names }} | Raw: {{ door_notif }}"
    - condition: template
      value_template: "{{ welcome_names | length > 0 }}"
    - service: rest_command.welcome_api
      data:
        name: "{{ welcome_names }}"
    - delay: "00:01:00"
